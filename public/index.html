<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Русские шашки онлайн</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="side-panel">
        <div>
          <p class="eyebrow">онлайн-партия</p>
          <h1>Русские шашки</h1>
          <p class="status" id="statusText">Создайте комнату или подключитесь по коду.</p>
        </div>

        <div class="room-actions" id="lobbyActions">
          <input id="nameInput" autocomplete="name" maxlength="24" placeholder="Ваше имя" required />
          <button class="primary" id="createRoomButton" type="button">Создать комнату</button>
          <form id="joinForm" class="join-form">
            <input id="roomInput" autocomplete="off" maxlength="6" placeholder="Код комнаты" />
            <button type="submit">Войти</button>
          </form>
        </div>

        <div class="room-actions" id="gameActions" hidden>
          <button id="drawButton" type="button">Ничья</button>
          <button class="danger" id="leaveRoomButton" type="button">Выйти</button>
        </div>

        <div class="room-card" id="roomCard" hidden>
          <div>
            <span>Комната</span>
            <strong id="roomCode">----</strong>
          </div>
          <button id="copyLinkButton" type="button">Ссылка</button>
        </div>

        <div class="player-strip" id="playerStrip" hidden>
          <div>
            <span>Вы</span>
            <strong id="playerColor">не подключены</strong>
          </div>
          <div>
            <span>Игроки</span>
            <strong id="playerCount">0/2</strong>
          </div>
          <div>
            <span>Ход</span>
            <strong id="turnText">-</strong>
          </div>
        </div>

        <div class="score-card" id="scoreCard" hidden>
          <div>
            <span>Белые</span>
            <strong id="whiteName">-</strong>
          </div>
          <strong class="score-text" id="scoreText">0/0</strong>
          <div>
            <span>Черные</span>
            <strong id="blackName">-</strong>
          </div>
        </div>
      </section>

      <section class="board-shell" aria-label="Игровая доска">
        <div class="board" id="board"></div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <div class="modal-actions" id="modalActions"></div>
      </div>
    </div>

    <script src="/rules.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
