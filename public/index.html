<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Русские шашки онлайн</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <span>GOSHASHKI</span>
    </header>
    <button class="icon-button sound-toggle" id="soundToggle" type="button" aria-label="Выключить звук">
      <img class="sound-icon sound-on-icon" src="/speaker-high-light.svg" alt="" aria-hidden="true" />
      <img class="sound-icon sound-off-icon" src="/speaker-simple-x-light.svg" alt="" aria-hidden="true" />
    </button>
    <button class="icon-button music-toggle" id="musicToggle" type="button" aria-label="Выключить музыку">
      <span class="equalizer-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
    <button class="icon-button theme-toggle" id="uiThemeToggle" type="button" aria-label="Включить темную тему">
      <img class="theme-icon sun-icon" src="/sun-light.svg" alt="" aria-hidden="true" />
      <img class="theme-icon moon-icon" src="/moon-light.svg" alt="" aria-hidden="true" />
    </button>

    <main class="app">
      <section class="side-panel">
        <div>
          <h1 id="titleText">Создай комнату</h1>
          <p class="status" id="statusText">или подключись по коду</p>
        </div>

        <div class="room-actions" id="lobbyActions">
          <input id="nameInput" autocomplete="name" maxlength="24" placeholder="ИМЯ" required />
          <button class="primary" id="createRoomButton" type="button">Создать комнату</button>
          <form id="joinForm" class="join-form">
            <input id="roomInput" autocomplete="off" maxlength="6" placeholder="КОД КОМНАТЫ" />
            <button type="submit">Войти</button>
          </form>
          <div class="style-picker" id="stylePicker" aria-label="Стиль шашек">
            <button class="style-swatch is-selected" type="button" data-theme="midnight" aria-label="Черный стиль">
              <span></span>
            </button>
            <button class="style-swatch" type="button" data-theme="sky" aria-label="Голубой стиль">
              <span></span>
            </button>
            <button class="style-swatch" type="button" data-theme="walnut" aria-label="Темно-коричневый стиль">
              <span></span>
            </button>
            <button class="style-swatch" type="button" data-theme="lime" aria-label="Лаймовый стиль">
              <span></span>
            </button>
            <button class="style-swatch" type="button" data-theme="sand" aria-label="Яркий стиль">
              <span></span>
            </button>
            <button class="style-swatch super-swatch" type="button" data-theme="super" aria-label="Супер комната">
              <span></span>
            </button>
          </div>
        </div>

        <div class="room-card" id="roomCard" hidden>
          <div>
            <span>Комната</span>
            <strong id="roomCode">----</strong>
          </div>
          <button id="copyLinkButton" type="button">Ссылка</button>
        </div>

        <div class="player-strip" id="playerStrip" hidden>
          <div>
            <span>Вы</span>
            <strong id="playerColor">не подключены</strong>
          </div>
          <div>
            <span>Игроки</span>
            <strong id="playerCount">0/2</strong>
          </div>
          <div>
            <span>Ход</span>
            <strong id="turnText">-</strong>
          </div>
        </div>

        <div class="self-stack" id="selfStack">
          <div class="match-card self-card" id="selfCard" hidden>
            <span id="selfName">-</span>
            <strong id="selfScore">0</strong>
            <b id="selfColor">-</b>
          </div>
          <p class="thinking-text" id="thinkingText" hidden>думает, как сходить...</p>
          <div class="captured-pieces" id="selfCapturedPieces" hidden></div>
        </div>

        <div class="score-card" id="scoreCard" hidden>
          <div>
            <span>Белые</span>
            <strong id="whiteName">-</strong>
          </div>
          <strong class="score-text" id="scoreText">0/0</strong>
          <div>
            <span>Черные</span>
            <strong id="blackName">-</strong>
          </div>
        </div>
      </section>

      <section class="board-shell" aria-label="Игровая доска">
        <div class="reaction-bubble" id="reactionBubble" hidden></div>
        <div class="board" id="board"></div>
        <canvas class="ripple-canvas" id="rippleCanvas" aria-hidden="true"></canvas>
      </section>

      <div class="opponent-stack">
        <div class="match-card opponent-card" id="opponentCard" hidden>
          <span id="opponentName">-</span>
          <strong id="opponentScore">0</strong>
          <b id="opponentColor">-</b>
        </div>
        <p class="thinking-text opponent-thinking animated-dots" id="opponentThinkingText" hidden>думает, как сходить</p>
        <div class="captured-pieces opponent-captured" id="opponentCapturedPieces" hidden></div>
      </div>

      <button class="leave-action" id="leaveRoomButton" type="button" aria-label="Выйти" hidden>
        <span class="action-icon"></span>
      </button>
      <button class="super-room-code" id="superRoomCodeButton" type="button" hidden>----</button>

      <div class="room-actions game-actions" id="gameActions" hidden>
        <div class="reaction-actions" id="reactionActions" hidden>
          <button class="reaction-button" type="button" data-reaction="блин">блин</button>
          <button class="reaction-button" type="button" data-reaction="ой">ой</button>
          <button class="reaction-button" type="button" data-reaction="упс...">упс...</button>
          <button class="reaction-button" type="button" data-reaction="хорооош!">хорооош!</button>
          <button class="reaction-button" type="button" data-reaction="круто!">круто!</button>
          <button class="reaction-button" type="button" data-reaction="мощно">мощно</button>
          <button class="reaction-button" type="button" data-reaction="ходи!">ходи!</button>
          <button class="reaction-button" type="button" data-reaction="не спи">не спи</button>
          <button class="reaction-button" type="button" data-reaction="ты тут?">ты тут?</button>
        </div>
        <button class="danger icon-action surrender-action" id="surrenderButton" type="button">
          <span class="action-icon"></span>
          <span>Сдаться</span>
        </button>
        <button class="icon-action draw-action" id="drawButton" type="button">
          <span class="action-icon"></span>
          <span>Ничья</span>
        </button>
        <button class="shake-button" id="shakeButton" type="button" aria-label="Потрясти доску"></button>
        <button id="rematchButton" type="button">Реванш</button>
      </div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden>
      <span class="toast-icon" aria-hidden="true"></span>
      <span class="toast-message" id="toastMessage"></span>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle"></h2>
        <p id="modalText"></p>
        <input class="modal-input" id="modalNameInput" autocomplete="name" maxlength="24" placeholder="ИМЯ" hidden />
        <div class="modal-actions" id="modalActions"></div>
      </div>
    </div>

    <script src="/rules.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
